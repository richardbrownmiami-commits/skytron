<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Skytron</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0b1120;color:#e6edf3;font-family:system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column}.tabs{display:flex;background:#161b22;border-bottom:1px solid #30363d;padding:0 16px;overflow-x:auto;gap:0}.tab{padding:12px 20px;cursor:pointer;color:#8b949e;font-size:13px;font-weight:500;border-bottom:2px solid transparent;white-space:nowrap;user-select:none}.tab:hover{color:#e6edf3;background:#1c2333}.tab.active{color:#58a6ff;border-bottom-color:#58a6ff}.panel{flex:1;display:none;flex-direction:column;overflow:hidden}.panel.active{display:flex}#chatPanel{flex:1}.msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px;max-width:720px;margin:0 auto;width:100%}.msg{max-width:85%;padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.5;word-break:break-word;white-space:pre-wrap}.msg.user{background:#1e3a5f;align-self:flex-end;border-bottom-right-radius:4px}.msg.bot{background:#1c2333;align-self:flex-start;border-bottom-left-radius:4px;border:1px solid #30363d}.msg .label{font-size:10px;font-weight:600;margin-bottom:4px;display:block}.msg.user .label{color:#60a5fa;text-align:right}.msg.bot .label{color:#8b949e}.input-row{display:flex;gap:8px;padding:12px 16px;background:#161b22;border-top:1px solid #30363d;max-width:720px;margin:0 auto;width:100%}.input-row input{flex:1;padding:10px 14px;border-radius:8px;border:1px solid #30363d;background:#0b1120;color:#e6edf3;font-size:14px;outline:none}.input-row input:focus{border-color:#58a6ff}.input-row button{padding:10px 20px;border-radius:8px;border:none;background:#58a6ff;color:#0b1120;font-weight:600;font-size:14px;cursor:pointer}.input-row button:disabled{opacity:0.5}.input-row button.sending{background:#8b949e}details.thinking{background:#0b1120;border:1px solid #30363d;border-radius:8px;margin:8px 0;overflow:hidden;align-self:flex-start;min-width:200px}details.thinking[open]{background:#1c2333}details.thinking summary{padding:8px 12px;cursor:pointer;background:#161b22;color:#8b949e;font-size:12px;font-weight:600;user-select:none;letter-spacing:0.3px}details.thinking summary:hover{background:#1c2333}details.thinking summary .th-status{color:#58a6ff;font-weight:400}details.thinking .th-body{padding:8px 12px;max-height:300px;overflow-y:auto}details.thinking .th-line{padding:3px 0;font-size:12px;color:#8b949e;border-bottom:1px solid #21262d}details.thinking .th-line:last-child{border:none}details.thinking .th-line .th-step{color:#58a6ff;font-weight:600}details.thinking .th-line .th-tool{color:#f0883e}details.thinking.done summary .th-status{color:#3fb950}details.collapsible{background:#0b1120;border:1px solid #30363d;border-radius:8px;margin:8px 0;overflow:hidden}details.collapsible summary{padding:8px 12px;cursor:pointer;background:#161b22;color:#8b949e;font-size:11px;font-weight:600;user-select:none;letter-spacing:0.5px}details.collapsible summary:hover{background:#1c2333}details.collapsible .code-wrap{padding:8px 12px;overflow-x:auto;max-height:400px;overflow-y:auto}details.collapsible pre{margin:0;font-size:13px;line-height:1.4;color:#e6edf3;white-space:pre-wrap;word-break:break-word}.data-view{padding:16px;overflow-y:auto;max-width:720px;margin:0 auto;width:100%}.data-view .item{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px;margin-bottom:8px;font-size:13px;line-height:1.4}.data-view .item .key{color:#58a6ff;font-weight:600}.data-view .item .meta{color:#8b949e;font-size:11px;margin-top:4px}.nav-bar{display:flex;align-items:center;gap:6px;padding:8px 16px;justify-content:center;flex-wrap:wrap}.nav-bar button{background:#161b22;border:1px solid #30363d;color:#e6edf3;padding:4px 12px;border-radius:6px;cursor:pointer;font-size:12px}.nav-bar button:hover{background:#1c2333;border-color:#58a6ff}.nav-bar button:disabled{opacity:0.3;cursor:default}.nav-bar .page-input{width:50px;padding:4px 6px;border-radius:6px;border:1px solid #30363d;background:#0b1120;color:#e6edf3;font-size:12px;text-align:center;outline:none}.nav-bar .page-input:focus{border-color:#58a6ff}.nav-bar .page-info{color:#8b949e;font-size:12px;margin:0 4px}.history-frame{flex:1;border:none;width:100%;min-height:0}.data-view .empty{color:#8b949e;text-align:center;padding:40px 16px;font-size:14px}.loading{text-align:center;padding:40px;color:#8b949e;font-size:14px}@keyframes spin{to{transform:rotate(360deg)}}.spinner{width:20px;height:20px;border:2px solid #30363d;border-top-color:#58a6ff;border-radius:50%;animation:spin 0.6s linear infinite;display:inline-block;vertical-align:middle;margin-right:8px}</style></head><body><div class="tabs" id="tabs"><div class="tab active" data-tab="chat">Chat</div><div class="tab" data-tab="memory">Memory</div><div class="tab" data-tab="knowledge">Knowledge</div><div class="tab" data-tab="logs">Logs</div><div class="tab" data-tab="status">Status</div><div class="tab" data-tab="agents">Agents</div><div class="tab" data-tab="source">Source</div><div class="tab" data-tab="history">History</div><div class="tab" data-tab="monitor">Monitor</div></div><div class="panel active" id="chatPanel"><div class="msgs" id="msgs"></div><div class="nav-bar" id="navBar"></div><div class="input-row"><input type="text" id="msgInput" placeholder="Message Skytron..."><button id="sendBtn">Send</button></div></div><div class="panel" id="memoryPanel"><div class="data-view" id="memoryView"><div class="loading"><span class="spinner"></span>Loading...</div></div></div><div class="panel" id="knowledgePanel"><div class="data-view" id="knowledgeView"><div class="loading"><span class="spinner"></span>Loading...</div></div></div><div class="panel" id="logsPanel"><div class="data-view" id="logsView"><div class="loading"><span class="spinner"></span>Loading...</div></div></div><div class="panel" id="statusPanel"><div class="data-view" id="statusView"><div class="loading"><span class="spinner"></span>Loading...</div></div></div><div class="panel" id="agentsPanel"><div class="data-view" id="agentsView"><div class="loading"><span class="spinner"></span>Loading...</div></div></div><div class="panel" id="sourcePanel"><div class="data-view" id="sourceView"><div class="loading"><span class="spinner"></span>Loading...</div></div></div><div class="panel" id="historyPanel"><iframe class="history-frame" id="historyFrame"></iframe></div><div class="panel" id="monitorPanel"><div class="data-view" id="monitorView"><div class="loading"><span class="spinner"></span>Loading...</div></div></div><script>var T={chat:1,memory:2,knowledge:3,logs:4,status:5,source:6,history:7,monitor:8};var msgs=document.getElementById("msgs"),inp=document.getElementById("msgInput"),btn=document.getElementById("sendBtn"),navBar=document.getElementById("navBar");var allMsgs=[],curPage=1,pageSize=20,totalPages=1;function showTab(n){document.querySelectorAll(".panel").forEach(function(p){p.classList.remove("active")});document.querySelectorAll(".tab").forEach(function(t){t.classList.remove("active")});document.getElementById(n+"Panel").classList.add("active");document.querySelector("[data-tab='"+n+"']").classList.add("active");if(n==="chat")refreshChat();else if(n==="history"){var f=document.getElementById("historyFrame");if(!f.getAttribute("data-loaded")){f.src="/brain/history?c=default&p=1";f.setAttribute("data-loaded","1")}}else loadData(n)}document.getElementById("tabs").addEventListener("click",function(e){var t=e.target;if(t.classList.contains("tab"))showTab(t.getAttribute("data-tab"))});function refreshChat(){fetch("/brain/memory").then(function(r){return r.json()}).then(function(d){allMsgs=d.entries||[];totalPages=Math.max(1,Math.ceil(allMsgs.length/pageSize));curPage=totalPages;renderPage()}).catch(function(){msgs.innerHTML="<div class=\"empty\">Failed to load history</div>"})}function renderPage(){msgs.innerHTML="";var start=(curPage-1)*pageSize;var end=Math.min(start+pageSize,allMsgs.length);for(var i=start;i<end;i++){var m=allMsgs[i];addMsg(m.role,m.content)}updateNav();msgs.scrollTop=msgs.scrollHeight}function updateNav(){var nav=navBar;nav.innerHTML="<button onclick=\"firstPage()\""+(curPage<=1?" disabled":"")+">&laquo;</button><button onclick=\"prevPage()\""+(curPage<=1?" disabled":"")+">&lsaquo;</button><span class=\"page-info\">Page</span><input class=\"page-input\" id=\"pageInput\" type=\"text\" value=\""+curPage+"\" onchange=\"jumpPage(this.value)\"/><span class=\"page-info\">of "+totalPages+"</span><button onclick=\"nextPage()\""+(curPage>=totalPages?" disabled":"")+">&rsaquo;</button><button onclick=\"lastPage()\""+(curPage>=totalPages?" disabled":"")+">&raquo;</button>"}function firstPage(){curPage=1;renderPage()}function prevPage(){if(curPage>1){curPage--;renderPage()}}function nextPage(){if(curPage<totalPages){curPage++;renderPage()}}function lastPage(){curPage=totalPages;renderPage()}function jumpPage(v){v=parseInt(v);if(v>=1&&v<=totalPages){curPage=v;renderPage()}else{document.getElementById("pageInput").value=curPage}}function esc(s){var d=document.createElement("div");d.textContent=s;return d.innerHTML}function render(t,r){if(r==="user")return esc(t);var out="",i=0;while(true){var si=t.indexOf("```",i);if(si===-1){out+=esc(t.slice(i));break}out+=esc(t.slice(i,si));var ei=t.indexOf("```",si+3);if(ei===-1){out+=esc(t.slice(si));break}var bl=t.slice(si+3,ei);var nl=bl.indexOf("\n");var lb=nl>0?bl.slice(0,nl).toUpperCase()||"CODE":"CODE";var cd=nl>0?bl.slice(nl+1):bl;out+="<details class=\"collapsible\"><summary>"+lb+"</summary><div class=\"code-wrap\"><pre>"+esc(cd)+"</pre></div></details>";i=ei+3}return out}function addMsg(r,t){var d=document.createElement("div");d.className="msg "+r;d.innerHTML="<span class=\"label\">"+(r==="user"?"You":"Skytron")+"</span>"+render(t,r);msgs.appendChild(d)}btn.addEventListener("click",function(){send()});inp.addEventListener("keydown",function(e){if(e.key==="Enter")send()});var thinkingMsg=null,thinkingActionId=null,thinkingTimer=null,thinkingSteps=[];function thinkingBubble(){thinkingSteps=[];var d=document.createElement("details");d.className="thinking";d.id="thinking";d.open=true;d.innerHTML="<summary>⚙<span class=\"th-status\">Processing...</span></summary><div class=\"th-body\"></div>";msgs.appendChild(d);d.scrollIntoView({behavior:"smooth"});return d}function parseStepLabel(t){try{var o=JSON.parse(t);if(o.tool)return o.tool.replace(/_/g," ").toUpperCase();return "PROCESSING"}catch(e){var s=t.slice(0,60).replace(/\n/g," ");return s.toUpperCase()}}function pollThinking(id){if(!thinkingMsg)return;fetch("/brain/logs?action_id="+id).then(function(r){return r.json()}).then(function(d){if(!thinkingMsg)return;var es=d.entries||[];var body=thinkingMsg.querySelector(".th-body");var summary=thinkingMsg.querySelector("summary");es.forEach(function(e){var label=parseStepLabel(e.content);if(thinkingSteps.indexOf(e.step)<0){thinkingSteps.push(e.step);var line=document.createElement("div");line.className="th-line";line.innerHTML="<span class=\"th-step\">"+esc(e.step)+"</span> <span class=\"th-tool\">"+esc(label)+"</span>";body.appendChild(line)}});if(es.length){var lastStep=parseStepLabel(es[es.length-1].content);summary.innerHTML="⚙<span class=\"th-status\">"+esc(lastStep)+"</span>"}fetch("/think/result?id="+id).then(function(r){return r.json()}).then(function(r2){if(!thinkingMsg)return;if(r2.status==="done"||r2.status==="error"){clearInterval(thinkingTimer);thinkingTimer=null;if(thinkingMsg){var s2=thinkingMsg.querySelector("summary");s2.innerHTML="✓<span class=\"th-status\">Done</span>";thinkingMsg.open=false;thinkingMsg.classList.add("done");thinkingMsg=null}refreshChat()}}).catch(function(){})}).catch(function(){})}function send(){var t=inp.value.trim();if(!t)return;inp.value="";btn.disabled=true;btn.textContent="";btn.classList.add("sending");thinkingMsg=thinkingBubble();fetch("/think",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({input:t})}).then(function(r){return r.json()}).then(function(d){if(d.action_id){thinkingActionId=d.action_id;thinkingTimer=setInterval(function(){pollThinking(thinkingActionId)},2000);setTimeout(function(){pollThinking(thinkingActionId)},500)}}).catch(function(){if(thinkingMsg){thinkingMsg.remove();thinkingMsg=null}msgs.innerHTML="<div class=\"empty\">Connection error</div>"}).finally(function(){btn.disabled=false;btn.textContent="Send";btn.classList.remove("sending")})}refreshChat();function loadData(n){var v=document.getElementById(n+"View");if(v.getAttribute("data-loaded"))return;v.innerHTML="<div class=\"loading\"><span class=\"spinner\"></span>Loading...</div>";var ep=n==="monitor"?"introspect":n;fetch("/brain/"+ep).then(function(r){return r.json()}).then(function(d){v.innerHTML=renderData(n,d);v.setAttribute("data-loaded","1")}).catch(function(){v.innerHTML="<div class=\"empty\">Failed to load "+n+"</div>"})}function renderData(n,d){if(!d||!d.results&&!d.entries&&!d.result&&!Array.isArray(d)&&!d.endpoints&&!d.summary){return "<div class=\"empty\">No data</div>"}if(n==="memory"){var r=d.entries||d.results||[];if(!r.length)return "<div class=\"empty\">No memory entries</div>";return r.map(function(m){return "<div class=\"item\"><span class=\"key\">"+esc(m.role||"")+"</span>: "+esc((m.content||"").slice(0,300))+"<div class=\"meta\">"+new Date(m.created_at).toLocaleString()+"</div></div>"}).join("")}if(n==="knowledge"){var r2=d.entries||d.results||[];if(!r2.length)return "<div class=\"empty\">No knowledge entries</div>";return r2.map(function(k){return "<div class=\"item\"><span class=\"key\">"+esc(k.key||"")+"</span>: "+esc((k.content||"").slice(0,200))+"<div class=\"meta\">"+esc(k.category||"")+"</div></div>"}).join("")}if(n==="logs"){var r3=d.entries||d.results||[];if(!r3.length)return "<div class=\"empty\">No logs</div>";return r3.map(function(l){return "<div class=\"item\"><span class=\"key\">Step "+esc(String(l.step||""))+"</span> ("+esc(l.model||"")+")<br>"+esc((l.content||"").slice(0,200))+"<div class=\"meta\">"+new Date(l.created_at).toLocaleString()+"</div></div>"}).join("")}if(n==="status"){return Object.keys(d).map(function(k){return "<div class=\"item\"><span class=\"key\">"+esc(k)+"</span>: "+esc(String(d[k]||""))+"</div>"}).join("")}if(n==="agents"){var ra=d.agents||[];if(!ra.length)return "<div class=\"empty\">No sub-agents yet. Spawn one from chat with spawn_agent.</div>";return ra.map(function(a){var statusCl=a.status==="done"?"color:#3fb950":a.status==="running"?"color:#58a6ff":"color:#8b949e";return "<div class=\"item\"><span class=\"key\">"+esc(a.name||"")+"</span> (ID "+a.id+") <span style=\"font-size:11px;"+statusCl+"\">"+esc(a.status||"")+"</span><br>"+esc((a.role||"").slice(0,120))+"<div class=\"meta\">Steps: "+(a.step||0)+" | Tokens: "+(a.tokens||0)+" | "+new Date(a.created_at).toLocaleString()+"</div></div>"}).join("")}if(n==="source"){return Object.keys(d).map(function(k){var v=d[k];if(Array.isArray(v))return "<div class=\"item\"><span class=\"key\">"+esc(k)+"</span><br>"+v.map(function(x){return"<span style=\"color:#8b949e;font-size:12px\">"+esc(String(x))+"</span>"}).join(", ")+"</div>";return "<div class=\"item\"><span class=\"key\">"+esc(k)+"</span>: "+esc(String(v))+"</div>"}).join("")}if(n==="monitor"){var s=d.summary;var out="<div class=\"item\"><span class=\"key\">Summary</span><br>";if(s)out+=Object.keys(s).map(function(k){return"<span style=\"color:#8b949e;font-size:12px\">"+esc(k)+": </span><span>"+esc(String(s[k]))+"</span><br>"}).join("");out+="</div>";if(d.top_conversations&&d.top_conversations.length){out+="<div class=\"item\"><span class=\"key\">Top Conversations</span><br>"+d.top_conversations.slice(0,5).map(function(c){return"<span style=\"color:#58a6ff;font-size:12px\">"+esc(c.conversation_id||"")+"</span> ("+c.msg_count+" msgs)<br>"}).join("")+"</div>"}if(d.activity_30d&&d.activity_30d.length){out+="<div class=\"item\"><span class=\"key\">Activity (last 30 days)</span><br>"+d.activity_30d.slice(0,10).map(function(a){return"<span style=\"color:#8b949e;font-size:12px\">"+esc(a.day||"")+"</span>: "+a.count+" msgs<br>"}).join("")+"</div>"}if(d.knowledge_categories&&d.knowledge_categories.length){out+="<div class=\"item\"><span class=\"key\">Knowledge Categories</span><br>"+d.knowledge_categories.map(function(c2){return"<span style=\"color:#8b949e;font-size:12px\">"+esc(c2.category||"")+"</span>: "+c2.count+"<br>"}).join("")+"</div>"}return out}return "<div class=\"empty\">Unknown tab</div>"}</script></body></html>
