name: Build Android APK

on:
  push:
    branches: ["*"]
    paths:
      - 'work/skytron-app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    defaults:
      run:
        working-directory: work/skytron-app

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: work/skytron-app/web/package-lock.json

    - name: Install web dependencies
      run: npm ci
      working-directory: work/skytron-app/web

    - name: Build web app
      run: npm run build
      working-directory: work/skytron-app/web

    - name: Copy web assets to Android
      run: |
        rm -rf app/src/main/assets
        mkdir -p app/src/main/assets
        cp -r web/dist/* app/src/main/assets/

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.9

    - name: Build APK
      run: gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: work/skytron-app/app/build/outputs/apk/debug/app-debug.apk
