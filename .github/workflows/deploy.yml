name: Deploy Skytron

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Verify token and deploy
        run: |
          echo "=== Checking token ==="
          curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" "https://api.cloudflare.com/client/v4/accounts?per_page=1" | head -c 200
          echo ""
          echo "=== Running wrangler deploy ==="
          npx wrangler deploy 2>&1; EXIT=$?
          echo "EXIT_CODE=$EXIT"
          exit $EXIT
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
