name = "saraha-brain"
main = "src/index.ts"
compatibility_date = "2025-09-01"

[[d1_databases]]
binding = "DB"
database_name = "saraha-brain"
database_id = "4e4e5fde-2207-478a-b1ed-d55d6cc35a91"

[[vectorize]]
binding = "VECTORIZE"
index_name = "saraha-brain-memory"

[[services]]
binding = "BUDDHI_DWAR"
service = "buddhi-dwar"
environment = "production"

[ai]
binding = "AI"

[[triggers]]
type = "cron"
pattern = "*/2 * * * *"

[vars]
BRAIN_KEY = "Saraha-Brain-Key"
BRAVE_API_KEY = ""
CONTEXT7_API_KEY = "ctx7sk-687e27f3-2714-4ef2-ab6d-cdc978e6d4fa"
# ONE_KNOWLEDGE_KEY is set as a Cloudflare secret (not in plain text)
